on:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: events-db
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Seed output DB from repo
        run: |
          mkdir -p output
          if [ -f data/events.db ]; then
            cp data/events.db output/events.db
            echo "events.db seeded from repo (data/events.db)"
          else
            echo "no committed DB found, starting fresh"
          fi

      - name: Run crawl
        id: crawl
        continue-on-error: true
        run: python crawl.py

      - name: Prepare email
        if: always()
        continue-on-error: true
        run: python prepare_email.py

      - name: Set attachment list
        if: always()
        id: attach
        run: |
          if [ -s /tmp/mail_attachments.txt ]; then
            LIST=$(cat /tmp/mail_attachments.txt)
            echo "list<<EOF" >> $GITHUB_OUTPUT
            echo "$LIST" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Set email subject
        if: always()
        id: mailsub
        run: |
          SUBJECT=$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; n=datetime.now(ZoneInfo('Asia/Seoul')); print(f'[경쟁사 이벤트 RPA] {n.month:02d}월 {n.day:02d}일 기준', end='')")
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"
          echo "mail subject: $SUBJECT"

      - name: Send email (Gmail)
        if: always()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: myboy3743@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.mailsub.outputs.subject || '[경쟁사 이벤트 RPA] 기준' }}
          to: 111715@koreainvestment.com, 112247@koreainvestment.com, https://groups.google.com/g/Risk_Aigent
          from: myboy3743@gmail.com
          body: file:///tmp/mail_body.txt
          attachments: ${{ steps.attach.outputs.list }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: events-${{ github.run_number }}
          path: |
            output/*.xlsx
            output/*.txt
            output/events.db
          if-no-files-found: warn

      - name: Persist DB to repo
        if: always()
        run: |
          if [ ! -f output/events.db ]; then
            echo "no DB to persist"; exit 0
          fi
          mkdir -p data
          cp output/events.db data/events.db
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.db
          if git diff --cached --quiet; then
            echo "DB unchanged, nothing to commit"
          else
            git commit -m "chore: update events.db snapshot [skip ci]"
            git pull --rebase --autostash || true
            git push
          fi
